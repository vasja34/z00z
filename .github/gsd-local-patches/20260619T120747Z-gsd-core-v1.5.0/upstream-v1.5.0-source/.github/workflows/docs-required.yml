name: Docs Required

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  docs-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          fetch-depth: 50
      - name: Fetch base ref for diff
        run: git fetch --depth=50 origin "${BASE_REF}:refs/remotes/origin/${BASE_REF}"
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5.0.0
        with:
          node-version: '24'
      - name: Run docs-required lint
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
        run: node scripts/lint-docs-required.cjs

      - name: Detect docs/ changes
        id: docs-changed
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          if git diff --name-only "origin/${BASE_REF}...HEAD" | grep -q '^docs/'; then
            echo "docs_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "docs_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Docs parity — live registry check
        if: steps.docs-changed.outputs.docs_changed == 'true'
        run: node --test tests/docs-parity-live-registry.test.cjs
