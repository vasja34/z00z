name: Close Draft PRs

# pull_request_target (not pull_request) so the job runs in the base-repo
# context with a write-capable token even for PRs from forks. Without this,
# fork PRs from first-time/external contributors get a read-only GITHUB_TOKEN
# and the close/comment API calls 403 — letting them bypass the auto-close.
# Safe because this job only reads event metadata and never checks out or
# executes PR-supplied code.
# Residual platform limitation: GitHub deliberately does NOT trigger
# pull_request_target for fork branches whose names look like a Git SHA, so a
# contributor could still evade this by naming their head branch like a commit
# hash. Fully closing that gap needs a scheduled base-context sweep (separate
# concern); a draft PR that evades this still cannot merge and still fails the other gates.
on:
  pull_request_target:
    types: [opened, reopened, converted_to_draft]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  pull-requests: write

jobs:
  close-if-draft:
    name: Reject draft PRs
    # Maintainers may use draft PRs for internal coordination.
    if: >-
      github.event.pull_request.draft == true &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association) == false
    runs-on: ubuntu-latest
    steps:
      - name: Comment and close draft PR
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const pr = context.payload.pull_request;
            const repoUrl = context.repo.owner + '/' + context.repo.repo;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: [
                '## Draft PRs are not accepted',
                '',
                'This project only accepts completed pull requests. Draft PRs are automatically closed.',
                '',
                '**Why?** GSD requires all PRs to be ready for review when opened \u2014 with tests passing, the correct PR template used, and a linked approved issue. Draft PRs bypass these quality gates and create review overhead.',
                '',
                '### What to do instead',
                '',
                '1. Finish your implementation locally',
                '2. Run `npm run test:coverage` and confirm all tests pass',
                '3. Open a **non-draft** PR using the [correct template](https://github.com/' + repoUrl + '/blob/main/CONTRIBUTING.md#pull-request-guidelines)',
                '',
                'See [CONTRIBUTING.md](https://github.com/' + repoUrl + '/blob/main/CONTRIBUTING.md) for the full process.',
              ].join('\n')
            });

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              state: 'closed'
            });

            core.info('Closed draft PR #' + pr.number + ': ' + pr.title);
