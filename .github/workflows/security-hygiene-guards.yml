name: security-hygiene-guards

on:
  push:
  pull_request:

jobs:
  phase-065-security-hygiene-guards:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Audit secret type hygiene
        run: bash scripts/audit/audit_secret_type_hygiene.sh

      - name: Audit secret equality hygiene
        run: bash scripts/audit/audit_secret_eq_hygiene.sh

      - name: Audit crypto RNG hygiene
        run: bash scripts/audit/audit_crypto_rng_hygiene.sh

      - name: Audit boundary panic hygiene
        run: bash scripts/audit/audit_boundary_panic_hygiene.sh

      - name: Audit log redaction hygiene
        run: bash scripts/audit/audit_log_redaction_hygiene.sh

      - name: Run storage live guardrails
        run: cargo test --release -p z00z_storage --test test_live_guardrails -- --nocapture

      - name: Run wallet logging acceptance
        run: cargo test --release -p z00z_wallets --test test_rpc_logging_acceptance -- --nocapture

      - name: Run wallet logging risk policy
        run: cargo test --release -p z00z_wallets --test test_rpc_logging_risk_policy -- --nocapture

      - name: Run networks RPC tests
        run: cargo test --release -p z00z_networks_rpc -- --nocapture
