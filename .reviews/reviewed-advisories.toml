[[reviewed]]
id = "RUSTSEC-2025-0141"
crate = "bincode"
version = "2.0.1"
scope = "project"
decision = "temporary_exception"
reason = "The advisory is unmaintained-status only. The crate is transitively embedded in z00z_core, z00z_utils, and z00z_wallets and is used across the Phase 060 execution surface. No repository-local memory-safety or RCE claim is attached to this RustSec item, and replacing the serialization stack inside the current closeout slice would widen protocol and persistence scope."
action = "Keep the repository on one canonical reviewed exception path now; schedule replacement or removal in the next dependency-refresh slice that can touch cross-crate serialization contracts."
owner = "phase-060-supply-chain"
sunset = "before the next dependency-refresh milestone after Phase 060"
ancestry = "z00z_core -> z00z_storage -> z00z_wallets; z00z_utils -> z00z_crypto -> z00z_wallets"
criticality = "high transitively, because the crate fans into core, storage, wallet, and simulator paths"
replacement = "Evaluate a maintained bincode successor or reduce the dependency fan-out before upgrading"
temporary_exception_conditions = "Allowed only while the advisory remains classification-only, the dependency path stays understood, and a later dependency-refresh slice owns the replacement plan"

